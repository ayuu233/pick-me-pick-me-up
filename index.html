<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PICK ME PICK ME UP! 洪嘉豪歌曲二選一</title>
<style>
*{box-sizing:border-box}
body{
 margin:0;
 background:#fff;
 color:#333;
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
#app{
 width:100%;
 max-width:430px;
 min-height:100vh;
 margin:auto;
 padding:20px 16px 40px;
}
h1{
 text-align:center;
 color:#f57c00;
 font-size:22px;
 line-height:1.35;
 margin:10px 0 8px;
}
.sort-subtitle{
 text-align:center;
 color:#777;
 font-size:15px;
 margin-bottom:22px;
}
.round-title{text-align:center;font-weight:700;font-size:20px}
.progress-text{text-align:center;color:#777;margin:8px}
.progress{height:8px;background:#eee;border-radius:20px;overflow:hidden}
.progress-bar{height:100%;background:#ff9800}
.back-btn{
 border:0;background:none;color:#f57c00;font-size:16px;
 visibility:hidden;margin-bottom:12px
}
.back-btn.show{visibility:visible}

.restart-area{
 text-align:center;
 margin-top:42px;
 display:flex;
 flex-direction:column;
 gap:14px;
 align-items:center;
}

.restart-btn{
 width:70%;
 max-width:260px;
 padding:10px;
 border-radius:14px;
 border:1.5px solid #bbb;
 background:#fafafa;
 color:#777;
 font-size:14px;
}

.restart-btn:active{
 background:#f2f2f2;
 transform:scale(0.98);
}

.cards{
 display:flex;
 gap:12px;
 justify-content:center;
 margin-top:22px;
}
.song-card{
 width:calc(50% - 6px);
 max-width:190px;
 background:white;
 border-radius:20px;
 overflow:hidden;
 box-shadow:0 5px 18px #00000012;
 display:flex;
 flex-direction:column;
}
.cover{
 width:100%;
 aspect-ratio:1/1;
 background:#f5f5f5;
 display:flex;
 align-items:center;
 justify-content:center;
 color:#999;
}
.song-btn{
 width:82%;
 height:52px;
 margin:14px auto;
 padding:0 8px;
 border-radius:30px;
 border:2px solid #ff9800;
 background:#fff;
 color:#ff9800;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 white-space:nowrap;
 overflow:hidden;
 line-height:1;
}
.song-btn:active{
 transform:scale(0.97);
}
.song-btn.selected{
 background:#ff9800;
 color:white;
 border-color:#ff9800;
 transform:scale(0.98);
 box-shadow:0 6px 14px rgba(255,152,0,0.35);
}
.pool-box{
 border-radius:20px;
 padding:18px;
 margin:18px 0;
}
.win-box{background:#fff7e8;border:2px solid #ffb74d}
.lose-box{background:#f5f5f5;border:2px solid #ddd}
.pool{display:flex;flex-wrap:wrap;gap:10px}
.pool span{
 padding:8px 14px;
 border-radius:20px;
 background:#fff;
 color:#f57c00;
 font-size:14px;
}
.lose span{color:#888}
.next-btn{
 width:100%;
 padding:14px;
 border:0;
 border-radius:30px;
 background:#ff9800;
 color:#fff;
 font-size:16px;
 margin:8px 0;
}
.final-three{
 display:grid;
 grid-template-columns:repeat(2, minmax(0, 1fr));
 gap:22px;
 padding:10px 20px;
}

.final-three .song-card{
 width:100%;
 max-width:none;
}

.final-three .song-card:nth-child(3){
 grid-column:1 / 3;
 justify-self:center;
 width:calc(50% - 6px);
}

.final-three .cover{
 aspect-ratio:1 / 1;
}

.final-three .song-btn{
 height:56px;
 width:88%;
 margin:14px auto;
 padding:0 10px;
 font-size:14px;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:ellipsis;
}

.final-card{
 margin:30px auto;
 width:300px;
 text-align:center;
 border-radius:20px;
 padding:18px;
 box-shadow:0 5px 20px #0002;
}

.final-card h2{
 margin:20px auto 8px;
 width:75%;
 line-height:1.1;
 white-space:nowrap;
 overflow:hidden;
 text-overflow:clip;
 letter-spacing:-0.5px;
 text-align:center;
}

.final-cover{
 aspect-ratio:1;
 background:#f5f5f5;
 border-radius:16px;
 display:flex;
 align-items:center;
 justify-content:center;
 color:#999;
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const app=document.getElementById("app");

const songs=[{"name": "拍下愛", "date": "2017-07-01", "sort": "Pai Xia Ai"}, {"name": "不留", "date": "2017-07-01", "sort": "Bu Liu"}, {"name": "半天空檔", "date": "2018-05-14", "sort": "Halfday Off"}, {"name": "表情符號", "date": "2018-07-30", "sort": "Expressions"}, {"name": "掉進海的眼淚", "date": "2018-11-14", "sort": "Teardrops In The Ocean"}, {"name": "好奇殺死愛", "date": "2018-12-17", "sort": "Curiosity"}, {"name": "龜兔之愛", "date": "2018-12-17", "sort": "Follow The Rabbit"}, {"name": "十號儲物櫃", "date": "2019-06-03", "sort": "Locker No. 10"}, {"name": "我說不可以", "date": "2020-01-15", "sort": "I Said No"}, {"name": "自問自答", "date": "2020-04-28", "sort": "Monologue"}, {"name": "曲線型戀情", "date": "2020-08-04", "sort": "Weird Romance"}, {"name": "窮小子", "date": "2020-11-17", "sort": "The Underdog"}, {"name": "謎之微笑", "date": "2021-04-20", "sort": "Mysterious Smile"}, {"name": "逆時車站", "date": "2021-07-20", "sort": "Time Travel"}, {"name": "主角光環", "date": "2021-10-12", "sort": "Halo"}, {"name": "及時行樂", "date": "2022-01-27", "sort": "Missing You"}, {"name": "活人鏢靶", "date": "2022-04-26", "sort": "The Dartboard"}, {"name": "救", "date": "2022-05-31", "sort": "Rescue"}, {"name": "防火門", "date": "2022-05-31", "sort": "Fire Door"}, {"name": "我懂", "date": "2022-05-31", "sort": "I Understand"}, {"name": "24/7戀人", "date": "2022-05-31", "sort": "24/7 Lovers"}, {"name": "這天那天某天", "date": "2022-05-31", "sort": "Days"}, {"name": "污糟兒", "date": "2022-07-20", "sort": "Dirty"}, {"name": "還原淚", "date": "2022-10-05", "sort": "Cycle Of Tears"}, {"name": "活誰的命", "date": "2022-10-17", "sort": "Twisted Fate"}, {"name": "海邊的呀豪", "date": "2022-11-01", "sort": "Such A Beach"}, {"name": "隨波逐流", "date": "2023-01-05", "sort": "Go With The Flow"}, {"name": "My Secret Park", "date": "2023-02-14", "sort": "My Secret Park"}, {"name": "洗面", "date": "2023-06-01", "sort": "Cleansed"}, {"name": "只要你不尴尬", "date": "2023-10-03", "sort": "The Art of Embarrassment"}, {"name": "黑玻璃", "date": "2024-01-04", "sort": "Tinted Windows"}, {"name": "Truth or Dare", "date": "2024-02-29", "sort": "Truth or Dare"}, {"name": "衰仔樂園", "date": "2024-03-22", "sort": "Kenny Song"}, {"name": "逆便所", "date": "2024-03-28", "sort": "We Fight Back"}, {"name": "漫天星", "date": "2024-03-28", "sort": "So Bright"}, {"name": "拆禮物的孩子", "date": "2024-03-28", "sort": "Unboxing With Kaho"}, {"name": "預言家", "date": "2024-03-28", "sort": "The Prophet"}, {"name": "明星示範生", "date": "2024-03-28", "sort": "Superstar"}, {"name": "離永遠只差一點", "date": "2024-03-28", "sort": "Li Yong Yuan Zhi Cha Yi Dian"}, {"name": "拜託", "date": "2024-07-23", "sort": "Please"}, {"name": "跟你分擔失落比較快樂", "date": "2024-10-08", "sort": "Take It Out On Me"}, {"name": "閃光", "date": "2025-03-28", "sort": "Flash"}, {"name": "親愛的", "date": "2025-07-08", "sort": "Dearest"}, {"name": "下世愛你", "date": "2025-09-30", "sort": "Till We Meet Again"}, {"name": "被害妄想", "date": "2025-11-27", "sort": "Paranoia"}, {"name": "畜生", "date": "2025-11-27", "sort": "Scum"}, {"name": "穿波鞋的惡魔", "date": "2026-03-17", "sort": "The Devil Wears Sneakers"}, {"name": "一筆滿意", "date": "2026-06-22", "sort": "Stroke of Luck"}];

let state={
 pool:[],
 initialPool:[],
 pairs:[],
 index:0,
 wins:[],
 loses:[],
 round:1,
 final:null,
 history:[],
 selected:null,
 tempSelected:null
};

function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}

let selectedSort = null;

function sortLabel(){
 const map={
  time:"時間順序",
  timeDesc:"時間倒序",
  az:"英文歌名首字母 A-Z",
  za:"英文歌名首字母 Z-A",
  random:"完全打亂"
 };
 return map[selectedSort] || "";
}

function start(){
 showStart();
}

function showStart(){
 app.innerHTML=`
 <h1>PICK ME PICK ME UP!<br>洪嘉豪歌曲二選一</h1>
 <div style="text-align:center;margin-top:30px">
 <h3>請選擇歌曲排序方式</h3>
 <button class="next-btn" onclick="beginGame('time')">A. 時間順序</button>
 <button class="next-btn" onclick="beginGame('timeDesc')">B. 時間倒序</button>
 <button class="next-btn" onclick="beginGame('az')">C. 英文歌名首字母 A-Z</button>
 <button class="next-btn" onclick="beginGame('za')">D. 英文歌名首字母 Z-A</button>
 <button class="next-btn" onclick="beginGame('random')">E. 完全打亂</button>
 </div>`;
}

function beginGame(type){
 selectedSort=type;
 let list=[...songs];

 if(type==="time"){
   list.sort((a,b)=>new Date(a.date)-new Date(b.date));
 }else if(type==="timeDesc"){
   list.sort((a,b)=>new Date(b.date)-new Date(a.date));
 }else if(type==="az"){
   list.sort((a,b)=>a.sort.localeCompare(b.sort));
 }else if(type==="za"){
   list.sort((a,b)=>b.sort.localeCompare(a.sort));
 }else{
   list=shuffle(list);
 }

 state.pool=list.map(x=>x.name);
 state.initialPool=[...state.pool];
 state.round=1;
 state.wins=[];
 state.loses=[];
 createPairs();
 render();
}

function createPairs(){
 state.pairs=[];
 for(let i=0;i<state.pool.length;i+=2){
  if(state.pool[i+1]) state.pairs.push([state.pool[i],state.pool[i+1]]);
 }
 state.index=0;
}

function fontSize(name){
 let size=16;
 const max=140;
 const c=document.createElement("canvas");
 const ctx=c.getContext("2d");
 while(size>10){
  ctx.font=size+"px -apple-system";
  if(ctx.measureText(name).width<=max) break;
  size--;
 }
 return size+"px";
}

function choose(song){
 const pair=state.pairs[state.index];
 const lose=pair[0]===song?pair[1]:pair[0];

 // 点击后先展示选中状态
 state.tempSelected=song;
 render();

 setTimeout(()=>{
   const old=state.history.find(h=>h.round===state.round && h.index===state.index);

   // 如果当前题已有选择，替换原来的结果
   if(old){
     const oldWinIndex=state.wins.indexOf(old.selected);
     const oldLoseIndex=state.loses.indexOf(old.selected===pair[0]?pair[1]:pair[0]);
     if(oldWinIndex>-1) state.wins.splice(oldWinIndex,1);
     if(oldLoseIndex>-1) state.loses.splice(oldLoseIndex,1);
   }

   state.history=state.history.filter(h=>!(h.round===state.round && h.index===state.index));

   state.history.push({
     round:state.round,
     index:state.index,
     pair:[...pair],
     selected:song
   });

   state.wins[state.index]=song;
   state.loses[state.index]=lose;

   state.tempSelected=null;
   state.index++;

   if(state.index>=state.pairs.length){
    if(state.wins.length===3) finalThree();
    else result();
   }else{
    render();
   }
 },300);
}

function backQuestion(){
 if(state.index<=0) return;

 const targetIndex=state.index-1;
 const target=state.history.find(h=>h.round===state.round && h.index===targetIndex);

 state.index=targetIndex;

 if(target){
   state.tempSelected=target.selected;
   state.selected=target.selected;
 }else{
   state.tempSelected=null;
   state.selected=null;
 }

 render();
}



function restartAll(){
 // 從第一輪第一題重新開始：保留排序方式，清除全部選擇紀錄
 state.pool=[...state.initialPool];
 state.pairs=[];
 state.index=0;
 state.wins=[];
 state.loses=[];
 state.round=1;
 state.history=[];
 state.tempSelected=null;
 state.selected=null;
 createPairs();
 render();
}

function backToSort(){
 // 重新選擇排序方式：清除整個遊戲狀態並返回排序選擇頁
 state.pool=[];
 state.initialPool=[];
 state.pairs=[];
 state.index=0;
 state.wins=[];
 state.loses=[];
 state.round=1;
 state.history=[];
 state.tempSelected=null;
 state.selected=null;
 selectedSort=null;
 showStart();
}

function restartCurrentRound(){
 // 重新開始本輪：保留之前輪次結果，只清除目前輪次選擇
 state.wins=[];
 state.loses=[];
 state.history=state.history.filter(h=>h.round!==state.round);
 state.index=0;
 state.tempSelected=null;
 state.selected=null;
 createPairs();
 render();
}

function render(){
 const pair=state.pairs[state.index];
 const selectedHistory = state.history.find(h=>h.round===state.round && h.index===state.index);
 const selectedSong = state.tempSelected || (selectedHistory ? selectedHistory.selected : null);
 app.innerHTML=`
 <h1>PICK ME PICK ME UP!<br>洪嘉豪歌曲二選一</h1>
 <div class="sort-subtitle">按照${sortLabel()}排序</div>
 ${state.index>0 ? `
 <button class="back-btn show" onclick="backQuestion()">← 返回上一題</button>
 ` : state.round===1 ? `
 <button class="back-btn show" onclick="backToSort()">← 重新選擇排序方式</button>
 ` : `
 <button class="back-btn" style="visibility:hidden">← 返回上一題</button>
 `}
 <div class="round-title">第${state.round}輪</div>
 <div class="progress-text">${state.index+1}/${state.pairs.length}</div>
 <div class="progress"><div class="progress-bar" style="width:${state.index/state.pairs.length*100}%"></div></div>
 <div class="cards">${pair.map(s=>`
 <div class="song-card">
 <div class="cover">封面</div>
 <button class="song-btn ${selectedSong===s ? "selected" : ""}" style="font-size:${fontSize(s)}" onclick="choose('${s}')">${s}</button>
 </div>`).join("")}</div>
 ${!(state.round===1 && state.index===0) ? `
 <div class="restart-area">
 <button class="restart-btn" onclick="restartCurrentRound()">從本輪第一題重新開始</button>
 <button class="restart-btn" onclick="restartAll()">從第一輪第一題重新開始</button>
 </div>` : ""}`;
}

function result(){
 app.innerHTML=`
 <h1>PICK ME PICK ME UP!<br>洪嘉豪歌曲二選一</h1>
 <div class="round-title">第${state.round}輪完成</div>
 <h3>晉級池</h3>
 <div class="pool-box win-box"><div class="pool">${state.wins.map(x=>`<span>${x}</span>`).join("")}</div></div>
 <h3>淘汰池</h3>
 <div class="pool-box lose-box"><div class="pool lose">${state.loses.map(x=>`<span>${x}</span>`).join("")}</div></div>
 <button class="next-btn" onclick="next()">進入下一輪</button>`;
}

function next(){
 state.pool=[...state.wins];
 state.wins=[];
 state.loses=[];
 state.round++;
 createPairs();
 render();
}

function finalThree(){
 app.innerHTML=`
 <h1>最後三強</h1>
 <div class="cards final-three">${state.wins.map(x=>`
 <div class="song-card">
 <div class="cover">封面</div>
 <button class="song-btn" style="font-size:${fontSize(x)}" onclick="finish('${x}')">${x}</button>
 </div>`).join("")}</div>`;
}

function finish(x){
 app.innerHTML=`
 <h1>你的洪曲TOP1是</h1>
 <div class="final-card">
 <div class="final-cover">封面</div>
 <h2 id="winner-title">${x}</h2>
 </div>
 <button class="next-btn" onclick="start()">再來一次</button>`;

 const title=document.getElementById("winner-title");
 let size=38;
 title.style.fontSize=size+"px";
 while(title.scrollWidth>title.clientWidth && size>18){
   size--;
   title.style.fontSize=size+"px";
 }
}

start();
</script>
</body>
</html>
